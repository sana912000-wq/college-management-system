<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>
    <p class="info-text">Please select your role to continue</p>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <!-- ROLE SELECTION -->
      <div class="role-group">
        <label><input type="radio" value="STUDENT" formControlName="role" /> Student</label>
        <label><input type="radio" value="FACULTY" formControlName="role" /> Faculty</label>
        <label><input type="radio" value="ADMIN" formControlName="role" /> Admin</label>
      </div>

      <!-- NAME -->
      <input type="text" placeholder="Name" formControlName="name" />
      <small
        *ngIf="
          !successMessage && registerForm.get('name')?.touched && registerForm.get('name')?.invalid
        "
        class="error"
      >
        Name is required
      </small>

      <!-- EMAIL -->
      <input type="email" placeholder="Email" formControlName="email" />
      <small
        *ngIf="
          !successMessage &&
          registerForm.get('email')?.touched &&
          registerForm.get('email')?.invalid
        "
        class="error"
      >
        <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
        <span *ngIf="registerForm.get('email')?.errors?.['email']">Enter valid email</span>
      </small>

      <!-- PHONE -->
      <input type="text" placeholder="Phone" formControlName="phone" />
      <small
        *ngIf="
          !successMessage &&
          registerForm.get('phone')?.touched &&
          registerForm.get('phone')?.invalid
        "
        class="error"
      >
        <span *ngIf="registerForm.get('phone')?.errors?.['required']">Phone is required</span>
        <span *ngIf="registerForm.get('phone')?.errors?.['pattern']"
          >Enter valid 10 digit phone</span
        >
      </small>

      <!-- PASSWORD -->
      <input type="password" placeholder="Password" formControlName="password" />
      <small
        *ngIf="
          !successMessage &&
          registerForm.get('password')?.touched &&
          registerForm.get('password')?.invalid
        "
        class="error"
      >
        Password is required (minimum 6 characters)
      </small>

      <!-- STUDENT FIELD -->
      <input
        type="text"
        placeholder="Enrollment Year"
        formControlName="enrollmentYear"
        *ngIf="registerForm.value.role === 'STUDENT'"
      />

      <!-- FACULTY FIELDS -->
      <input
        type="text"
        placeholder="Department"
        formControlName="department"
        *ngIf="registerForm.value.role === 'FACULTY'"
      />

      <input
        type="text"
        placeholder="Designation"
        formControlName="designation"
        *ngIf="registerForm.value.role === 'FACULTY'"
      />

      <!-- ERROR -->
      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <!-- SUCCESS -->
      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <!-- BUTTON -->
      <button type="submit" [disabled]="!registerForm.valid">Register</button>

      <!-- LOGIN LINK -->
      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </form>
  </div>
</div>
